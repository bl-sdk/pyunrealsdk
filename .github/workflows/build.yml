name: CI

on: [
  push,
  pull_request,
  workflow_dispatch
]

jobs:
  build-windows:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        preset: [
          "clang-willow-release",
          "clang-willow64-release",
          "clang-oak-release",
          "clang-oak2-release",
          "msvc-willow-release",
          "msvc-willow64-release",
          "msvc-oak-release",
          "msvc-oak2-release",
        ]

    steps:
    - name: Setup Clang
      if: startswith(matrix.preset, 'clang')
      uses: egor-tensin/setup-clang@v1

    - name: Add MSVC to PATH
      if: startswith(matrix.preset, 'msvc')
      uses: TheMrMilchmann/setup-msvc-dev@v3
      with:
        arch: ${{ fromJSON('["x64", "x86"]')[contains(matrix.preset, '-willow-')] }}

    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest

    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure build
      run: cmake . --preset ${{ matrix.preset }} -G Ninja

    - name: Build
      run: cmake --build out/build/${{ matrix.preset }}

  build-ubuntu:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - preset: clang-cross-willow-release
            container: clang-cross
          - preset: clang-cross-willow64-release
            container: clang-cross
          - preset: clang-cross-oak-release
            container: clang-cross
          - preset: clang-cross-oak2-release
            container: clang-cross
          - preset: llvm-mingw-willow-release
            container: llvm-mingw
          - preset: llvm-mingw-willow64-release
            container: llvm-mingw
          - preset: llvm-mingw-oak-release
            container: llvm-mingw
          - preset: llvm-mingw-oak2-release
            container: llvm-mingw
          - preset: mingw-willow-release
            container: mingw
          - preset: mingw-willow64-release
            container: mingw
          - preset: mingw-oak-release
            container: mingw
          - preset: mingw-oak2-release
            container: mingw

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: devcontainers/ci@v0.3
        with:
          cacheFrom: ghcr.io/bl-sdk/${{ matrix.toolchain.container }}:latest
          configFile: .devcontainer/${{ matrix.toolchain.container }}/devcontainer.json
          push: never
          # The git watcher cmake thinks something's unsafe? Doesn't happen to me locally.
          runCmd: |
            git config --global --add safe.directory `pwd`
            git config --global --add safe.directory `pwd`/libs/unrealsdk

            cmake . --preset ${{ matrix.toolchain.preset }} -G Ninja
            cmake --build out/build/${{ matrix.toolchain.preset }}

# ==============================================================================

  stubgen:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        flavour:
          - WILLOW
          - OAK
          - OAK2

    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ">=3.13"

    - name: Generate stubs
      run: |
        pip install -r stubgen/requirements.txt
        python -m stubgen ${{ matrix.flavour }}

    - name: Run pyright
      uses: jakebailey/pyright-action@v2
      with:
        working-directory: ./stubgen/.out

    # Realistically these ought to always work cause the script runs them itself to format the stubs
    - name: Run Ruff Linting
      uses: chartboost/ruff-action@v1
      with:
        src: ./stubgen/.out

    - name: Run Ruff Formatting
      uses: chartboost/ruff-action@v1
      with:
        src: ./stubgen/.out
        args: format --check

# ==============================================================================

  clang-tidy:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        preset: [
          "clang-willow-release",
          "clang-willow64-release",
          "clang-oak-release",
          "clang-oak2-release",
        ]

    steps:
    - name: Setup Clang
      uses: egor-tensin/setup-clang@v1

    - name: Setup CMake and Ninja
      uses: lukka/get-cmake@latest

    - name: Setup Python
      uses: actions/setup-python@v5

    # Needed pyyaml for clang tidy to enable `-export-fixes`
    - name: Install pip packages
      run: pip install pyyaml

    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake . --preset ${{ matrix.preset }} -DCMAKE_DISABLE_PRECOMPILE_HEADERS=On

    - name: Remove `.modmap`s from compile commands
      run: |
        (Get-Content "out\build\${{ matrix.preset }}\compile_commands.json")    `
          -replace "@CMakeFiles.+?\.modmap", ""                                 `
        | Set-Content                                                           `
          -Path "out\build\${{ matrix.preset }}\compile_commands.json"

    - name: Run clang-tidy
      run: |
        python (Get-Command run-clang-tidy).Source                              `
          -p "out\build\${{ matrix.preset }}"                                   `
          -export-fixes clang-tidy-fixes.yml                                    `
          $([Regex]::Escape("$pwd\src") + ".+\.(c|cpp|h|hpp)$")

    - name: Process clang-tidy warnings
      uses: asarium/clang-tidy-action@v1
      with:
        fixesFile: clang-tidy-fixes.yml

  clang-format:
    runs-on: windows-latest

    steps:
    - name: Setup Clang
      uses: egor-tensin/setup-clang@v1

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run clang-format
      run: |
        clang-format                                                            `
          -n -Werror                                                            `
          $(Get-ChildItem                                                       `
              src                                                               `
              -File                                                             `
              -Recurse                                                          `
              -Include ("*.c", "*.cpp", "*.h", "*.hpp")                         `
            | % FullName)

  spelling:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check spelling
      uses: crate-ci/typos@master

  pyright:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Run pyright
      uses: jakebailey/pyright-action@v2
      with:
        working-directory: ./stubgen

  ruff:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Ruff Linting
      uses: chartboost/ruff-action@v1
      with:
        src: ./stubgen

    - name: Run Ruff Formatting
      uses: chartboost/ruff-action@v1
      with:
        src: ./stubgen
        args: format --check
